<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasting Events 2027 — Best Day Ever Venues</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #F5F2EE;
      color: #2C2C2C;
      padding: 48px 24px 64px;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── HEADER ─────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
    }
    .divider {
      width: 60px;
      height: 1px;
      background: #C9B99A;
      margin: 14px auto 0;
    }

    /* ── FLAGS ──────────────────────────────────────── */

    /* ── LEGEND ─────────────────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-radius: 24px;
      padding: 7px 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      font-size: 0.8rem;
      color: #444;
    }
    .legend-swatch {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── VENUE SUMMARY CARDS ────────────────────────── */
    .venue-summary {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 40px;
    }
    @media (max-width: 860px) {
      .venue-summary { grid-template-columns: repeat(3, 1fr); }
    }
    .venue-card {
      background: #fff;
      border-radius: 10px;
      padding: 14px 12px 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      text-align: center;
      border-top: 4px solid;
      position: relative;
    }
    .venue-card-code {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }
    .venue-card-name {
      font-size: 0.78rem;
      color: #333;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .venue-card-count {
      font-size: 1.9rem;
      font-weight: bold;
      line-height: 1;
    }
    .venue-card-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-top: 3px;
    }

    /* ── CALENDAR GRID ──────────────────────────────── */
    .section-title {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #aaa;
      text-align: center;
      margin-bottom: 18px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 48px;
    }
    @media (max-width: 860px) {
      .cal-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .month-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 14px 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    }
    .month-card.quiet {
      opacity: 0.5;
    }
    .month-card-name {
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      text-align: center;
      margin-bottom: 10px;
    }
    .month-card.quiet .month-card-name {
      color: #bbb;
    }

    .day-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .dh {
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      color: #ccc;
      text-transform: uppercase;
      padding-bottom: 3px;
    }
    .dh.sun { color: #B8A08A; }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .dc {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      min-height: 24px;
      cursor: default;
      position: relative;
    }
    .dc .dn {
      font-size: 0.62rem;
      line-height: 1;
      color: #bbb;
    }
    .dc.sun .dn { color: #C9B99A; }
    .dc.empty .dn { visibility: hidden; }

    /* single-event day */
    .dc.ev1 .dn {
      color: #fff;
      font-weight: bold;
    }

    /* multi-event day */
    .dc.ev2 .dn { color: #333; font-weight: bold; font-size: 0.58rem; }
    .dots {
      display: flex;
      gap: 2px;
      justify-content: center;
      margin-top: 1px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
    }

    /* tooltip */
    .dc[data-tip] { cursor: pointer; }
    .dc[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #2C2C2C;
      color: #fff;
      font-size: 0.65rem;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 10;
      pointer-events: none;
    }

    /* ── EVENT LIST ─────────────────────────────────── */
    .event-list-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 20px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    }
    .event-list-wrap h2 {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      color: #444;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    .month-block { margin-bottom: 20px; }
    .month-block-name {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid #F0EDE8;
    }

    .ev-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #F8F6F2;
    }
    .ev-row:last-child { border-bottom: none; }
    .ev-bar {
      width: 3px;
      height: 36px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .ev-date {
      min-width: 140px;
      font-size: 0.83rem;
      font-weight: bold;
      color: #2C2C2C;
    }
    .ev-venue {
      font-size: 0.83rem;
      color: #666;
      flex: 1;
    }
    .ev-badge {
      font-size: 0.68rem;
      font-weight: bold;
      color: #fff;
      border-radius: 4px;
      padding: 3px 9px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>Tasting Events 2027</h1>
    <p>Best Day Ever Venues</p>
    <div class="divider"></div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- Venue summary -->
  <p class="section-title">Events per venue</p>
  <div class="venue-summary" id="venue-summary"></div>

  <!-- Calendar -->
  <p class="section-title">Year at a glance</p>
  <div class="cal-grid" id="cal-grid"></div>

  <!-- List -->
  <div class="event-list-wrap">
    <h2>Full Schedule</h2>
    <div id="ev-list"></div>
  </div>

</div>
<script>
// ── DATA ─────────────────────────────────────────────────────────
const VENUES = {
  TA: { name: 'The Ashes Barns', color: '#5F7F73' },
  PH: { name: 'Pendrell Hall',   color: '#5C7DAA' },
  FB: { name: 'Foxtail Barns',   color: '#B86A4B' },
  MB: { name: 'The Mill Barns',  color: '#7A5C78' },
  WB: { name: 'Whistle Barns',   color: '#C6A664' },
  HB: { name: 'Hanbury Barns',   color: '#C97A73' },
};

const EVENTS = [
  { y:2027, m:1,  d:10, v:'MB' },
  { y:2027, m:1,  d:17, v:'FB' },
  { y:2027, m:1,  d:24, v:'WB' },
  { y:2027, m:1,  d:31, v:'HB' },
  { y:2027, m:2,  d:7,  v:'WB' },
  { y:2027, m:2,  d:21, v:'TA' },
  { y:2027, m:2,  d:21, v:'PH' },
  { y:2027, m:2,  d:28, v:'FB' },
  { y:2027, m:3,  d:14, v:'MB' },
  { y:2027, m:3,  d:21, v:'HB' },
  { y:2027, m:4,  d:11, v:'MB' },
  { y:2027, m:4,  d:18, v:'TA' },
  { y:2027, m:4,  d:25, v:'FB' },
  { y:2027, m:5,  d:9,  v:'PH' },
  { y:2027, m:5,  d:16, v:'HB' },
  { y:2027, m:5,  d:23, v:'WB' },
  { y:2027, m:6,  d:6,  v:'PH' },
  { y:2027, m:6,  d:13, v:'MB' },
  { y:2027, m:6,  d:20, v:'TA' },
  { y:2027, m:6,  d:27, v:'FB' },
  { y:2027, m:7,  d:4,  v:'HB' },
  { y:2027, m:7,  d:11, v:'TA' },
  { y:2027, m:7,  d:18, v:'WB' },
  { y:2027, m:10, d:10, v:'TA' },
  { y:2027, m:10, d:17, v:'HB' },
  { y:2027, m:11, d:7,  v:'PH' },
  { y:2027, m:11, d:21, v:'WB' },
  { y:2027, m:11, d:28, v:'MB' },
  { y:2027, m:11, d:28, v:'FB' },
];

// ── HELPERS ──────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DAYS_SHORT = ['Mo','Tu','We','Th','Fr','Sa','Su'];
const DAYS_FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function dateKey(y,m,d) { return `${y}-${m}-${d}`; }
function dow(y,m,d) {
  // returns 0=Mon … 6=Sun
  const jsDay = new Date(y, m-1, d).getDay(); // 0=Sun
  return jsDay === 0 ? 6 : jsDay - 1;
}
function isSunday(y,m,d) { return new Date(y,m-1,d).getDay() === 0; }

// Build event map
const evMap = {};
EVENTS.forEach(e => {
  const k = dateKey(e.y, e.m, e.d);
  if (!evMap[k]) evMap[k] = [];
  evMap[k].push(e);
});

// Count per venue
const counts = {};
Object.keys(VENUES).forEach(v => counts[v] = 0);
EVENTS.forEach(e => counts[e.v]++);


// ── LEGEND ────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
Object.entries(VENUES).forEach(([code, v]) => {
  legendEl.innerHTML += `<div class="legend-item">
    <div class="legend-swatch" style="background:${v.color}"></div>
    <span>${v.name}</span>
  </div>`;
});

// ── VENUE SUMMARY ─────────────────────────────────────────────────
const summaryEl = document.getElementById('venue-summary');
Object.entries(VENUES).forEach(([code, v]) => {
  const n = counts[code];
  summaryEl.innerHTML += `<div class="venue-card" style="border-top-color:${v.color}">
    <div class="venue-card-code">${code}</div>
    <div class="venue-card-name">${v.name}</div>
    <div class="venue-card-count" style="color:${v.color}">${n}</div>
    <div class="venue-card-label">tasting events</div>
  </div>`;
});

// ── CALENDAR ──────────────────────────────────────────────────────
const calEl = document.getElementById('cal-grid');

for (let m = 1; m <= 12; m++) {
  const daysInMonth = new Date(2027, m, 0).getDate();
  const firstDow    = dow(2027, m, 1); // 0=Mon
  const monthHasEvents = EVENTS.some(e => e.m === m);

  let html = `<div class="month-card${monthHasEvents ? '' : ' quiet'}">
    <div class="month-card-name">${MONTHS[m-1]}</div>
    <div class="day-headers">`;
  DAYS_SHORT.forEach((d,i) => {
    html += `<div class="dh${i===6?' sun':''}">${d}</div>`;
  });
  html += `</div><div class="days">`;

  // Leading empty cells
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="dc empty"><span class="dn">0</span></div>`;
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const k = dateKey(2027, m, d);
    const evs = evMap[k] || [];
    const sun = isSunday(2027, m, d);
    if (evs.length === 0) {
      html += `<div class="dc${sun?' sun':''}"><span class="dn">${d}</span></div>`;
    } else if (evs.length === 1) {
      const venue = VENUES[evs[0].v];
      const tip = `${venue.name} — ${DAYS_FULL[dow(2027,m,d)]} ${d} ${MONTHS[m-1]}`;
      html += `<div class="dc ev1" style="background:${venue.color}" data-tip="${tip}">
        <span class="dn">${d}</span>
      </div>`;
    } else {
      // Two events same day
      const tip = evs.map(e => VENUES[e.v].name).join(' & ') + ` — ${DAYS_FULL[dow(2027,m,d)]} ${d} ${MONTHS[m-1]}`;
      html += `<div class="dc ev2" data-tip="${tip}">
        <span class="dn">${d}</span>
        <div class="dots">${evs.map(e=>`<div class="dot" style="background:${VENUES[e.v].color}"></div>`).join('')}</div>
      </div>`;
    }
  }
  html += `</div></div>`;
  calEl.innerHTML += html;
}

// ── EVENT LIST ────────────────────────────────────────────────────
const listEl = document.getElementById('ev-list');

// Group by month
const byMonth = {};
EVENTS.forEach(e => {
  if (!byMonth[e.m]) byMonth[e.m] = [];
  byMonth[e.m].push(e);
});

Object.keys(byMonth).sort((a,b)=>a-b).forEach(m => {
  let html = `<div class="month-block">
    <div class="month-block-name">${MONTHS[m-1]} 2027</div>`;
  byMonth[m].sort((a,b)=> a.d - b.d).forEach(e => {
    const v = VENUES[e.v];
    const dow_idx = dow(2027, e.m, e.d);
    const dayName = DAYS_FULL[dow_idx];
    html += `<div class="ev-row">
      <div class="ev-bar" style="background:${v.color}"></div>
      <div class="ev-date">
        ${dayName} ${e.d} ${MONTHS[m-1]}
      </div>
      <div class="ev-venue">${v.name}</div>
      <div class="ev-badge" style="background:${v.color}">${e.v}</div>
    </div>`;
  });
  html += `</div>`;
  listEl.innerHTML += html;
});
</script>
</body>
</html>
